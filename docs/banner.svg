      </svg>
      <text x="30" y="16" class="sans" font-size="17" font-weight="600" letter-spacing="-0.17" fill="#f5ede5">Claude</text>
    </g>

    <!-- ChatGPT -->
    <g transform="translate(248 -16)">
      <svg x="0" y="0" width="22" height="22" viewBox="0 0 24 24">
        <path fill="#10A37F" d="M22.282 9.821a5.985 5.985 0 0 0-.516-4.91 6.046 6.046 0 0 0-6.51-2.9A6.065 6.065 0 0 0 4.981 4.18a5.985 5.985 0 0 0-3.998 2.9 6.046 6.046 0 0 0 .743 7.097 5.98 5.98 0 0 0 .51 4.911 6.05 6.05 0 0 0 6.515 2.9A5.985 5.985 0 0 0 13.26 24a6.056 6.056 0 0 0 5.772-4.206 5.99 5.99 0 0 0 3.997-2.9 6.056 6.056 0 0 0-.747-7.073zM13.26 22.43a4.476 4.476 0 0 1-2.876-1.04l.141-.081 4.779-2.758a.795.795 0 0 0 .392-.681v-6.737l2.02 1.168a.071.071 0 0 1 .038.052v5.583a4.504 4.504 0 0 1-4.494 4.494zM3.6 18.304a4.47 4.47 0 0 1-.535-3.014l.142.085 4.783 2.759a.771.771 0 0 0 .78 0l5.843-3.369v2.332a.08.08 0 0 1-.033.062L9.74 19.95a4.5 4.5 0 0 1-6.14-1.646zM2.34 7.896a4.485 4.485 0 0 1 2.366-1.973V11.6a.766.766 0 0 0 .388.676l5.815 3.355-2.02 1.168a.076.076 0 0 1-.071 0l-4.83-2.786A4.504 4.504 0 0 1 2.34 7.872zm16.597 3.855-5.833-3.387L15.119 7.2a.076.076 0 0 1 .071 0l4.83 2.791a4.494 4.494 0 0 1-.676 8.105v-5.678a.79.79 0 0 0-.407-.667zm2.01-3.023-.141-.085-4.774-2.782a.776.776 0 0 0-.785 0L9.409 9.23V6.897a.066.066 0 0 1 .028-.061l4.83-2.787a4.5 4.5 0 0 1 6.68 4.66zm-12.64 4.135-2.02-1.164a.08.08 0 0 1-.038-.057V6.075a4.5 4.5 0 0 1 7.375-3.453l-.142.08L8.704 5.46a.795.795 0 0 0-.393.681zm1.097-2.365 2.602-1.5 2.607 1.5v2.999l-2.597 1.5-2.607-1.5z"/>
      </svg>
      <text x="30" y="16" class="sans" font-size="17" font-weight="600" letter-spacing="-0.17" fill="#f5ede5">ChatGPT</text>
    </g>

    <!-- Gemini -->
    <g transform="translate(376 -16)">
      <svg x="0" y="0" width="22" height="22" viewBox="0 0 24 24">
        <path fill="#3186FF" d="M20.616 10.835a14.147 14.147 0 01-4.45-3.001 14.111 14.111 0 01-3.678-6.452.503.503 0 00-.975 0 14.134 14.134 0 01-3.679 6.452 14.155 14.155 0 01-4.45 3.001c-.65.28-1.318.505-2.002.678a.502.502 0 000 .975c.684.172 1.35.397 2.002.677a14.147 14.147 0 014.45 3.001 14.112 14.112 0 013.679 6.453.502.502 0 00.975 0c.172-.685.397-1.351.677-2.003a14.145 14.145 0 013.001-4.45 14.113 14.113 0 016.453-3.678.503.503 0 000-.975 13.245 13.245 0 01-2.003-.678z"/>
      </svg>
      <text x="30" y="16" class="sans" font-size="17" font-weight="600" letter-spacing="-0.17" fill="#f5ede5">Gemini</text>
    </g>

    <!-- Mistral -->
    <g transform="translate(486 -16)">
      <svg x="0" y="0" width="22" height="22" viewBox="0 0 24 24">
        <path fill="gold" d="M3.428 3.4h3.429v3.428H3.428V3.4zm13.714 0h3.43v3.428h-3.43V3.4z"/>
        <path fill="#FFAF00" d="M3.428 6.828h6.857v3.429H3.429V6.828zm10.286 0h6.857v3.429h-6.857V6.828z"/>
        <path fill="#FF8205" d="M3.428 10.258h17.144v3.428H3.428v-3.428z"/>
        <path fill="#FA500F" d="M3.428 13.686h3.429v3.428H3.428v-3.428zm6.858 0h3.429v3.428h-3.429v-3.428zm6.856 0h3.43v3.428h-3.43v-3.428z"/>
        <path fill="#E10500" d="M0 17.114h10.286v3.429H0v-3.429zm13.714 0H24v3.429H13.714v-3.429z"/>
      </svg>
      <text x="30" y="16" class="sans" font-size="17" font-weight="600" letter-spacing="-0.17" fill="#f5ede5">Mistral</text>
    </g>
  </g>

  <!-- FOOTER RIGHT: pills -->
  <g transform="translate(1192 580)">
    <!-- pills are right-aligned, so we'll position from right -->
    <!-- MCP · v1.0 (accent, with border) -->
    <g transform="translate(-110 -22)">
      <rect x="0" y="0" width="110" height="30" fill="none" stroke="#e8804a" stroke-opacity="0.55" stroke-width="1"/>
      <text x="55" y="20" class="mono" font-size="12" letter-spacing="0.72" text-anchor="middle" fill="#f3a875">MCP · v1.0</text>
    </g>
    <!-- SQLite -->
    <g transform="translate(-186 -22)">
      <rect x="0" y="0" width="68" height="30" fill="#ffffff" fill-opacity="0.06"/>
      <text x="34" y="20" class="mono" font-size="12" letter-spacing="0.72" text-anchor="middle" fill="#f5ede5">SQLite</text>
    </g>
    <!-- Go -->
    <g transform="translate(-228 -22)">
      <rect x="0" y="0" width="34" height="30" fill="#ffffff" fill-opacity="0.06"/>
      <text x="17" y="20" class="mono" font-size="12" letter-spacing="0.72" text-anchor="middle" fill="#f5ede5">Go</text>
    </g>
  </g>
