<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" role="img" aria-label="learning/runtime — Self-learning is a superpower. A Model Context Protocol server that turns your AI into a super-intelligent tutor.">
  <title>learning/runtime — Self-learning is a superpower.</title>
  <defs>
    <style>
      .mono { font-family: ui-monospace, "JetBrains Mono", "Cascadia Mono", "SFMono-Regular", Menlo, Consolas, monospace; }
      .sans { font-family: system-ui, -apple-system, "Inter Tight", "Segoe UI", Roboto, sans-serif; }
      .serif { font-family: "Instrument Serif", Georgia, "Times New Roman", serif; font-style: italic; }
    </style>
    <radialGradient id="glow1" cx="100%" cy="0%" r="80%" fx="100%" fy="0%">
      <stop offset="0%" stop-color="#e8804a" stop-opacity="0.36"/>
      <stop offset="60%" stop-color="#e8804a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0%" cy="100%" r="65%" fx="0%" fy="100%">
      <stop offset="0%" stop-color="#e8804a" stop-opacity="0.20"/>
      <stop offset="60%" stop-color="#e8804a" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" x="0" y="0" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M 64 0 L 0 0 0 64" fill="none" stroke="#f5ede5" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
    <radialGradient id="gridmask" cx="50%" cy="50%" r="58%">
      <stop offset="30%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <mask id="gm" maskUnits="userSpaceOnUse" x="0" y="0" width="1280" height="640">
      <rect width="1280" height="640" fill="url(#gridmask)"/>
    </mask>
    <radialGradient id="orb" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e8804a"/>
      <stop offset="100%" stop-color="#da6e38"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect width="1280" height="640" fill="#0c0908"/>
  <rect width="1280" height="640" fill="url(#grid)" mask="url(#gm)"/>
  <rect width="1280" height="640" fill="url(#glow1)"/>
  <rect width="1280" height="640" fill="url(#glow2)"/>

  <!-- EYEBROW -->
  <g>
    <line x1="88" y1="80" x2="112" y2="80" stroke="#f5ede5" stroke-opacity="0.4" stroke-width="1"/>
    <text x="126" y="84" class="mono" font-size="12" letter-spacing="2.6" fill="#f5ede5" fill-opacity="0.5">OPEN SOURCE  ·  MODEL CONTEXT PROTOCOL</text>
  </g>

  <!-- HERO: neural-net logo + wordmark, centered in 128px row -->
  <g transform="translate(88 110)">
    <g transform="translate(0 0) scale(1.28)">
      <g stroke="#f5ede5" stroke-width="1.2" stroke-linecap="round" stroke-opacity="0.5" fill="none">
        <line x1="26" y1="24" x2="50" y2="56"/>
        <line x1="72" y1="18" x2="50" y2="56"/>
        <line x1="82" y1="46" x2="50" y2="56"/>
        <line x1="68" y1="78" x2="50" y2="56"/>
        <line x1="22" y1="70" x2="50" y2="56"/>
        <line x1="44" y1="44" x2="50" y2="56"/>
      </g>
      <circle cx="26" cy="24" r="3.6" fill="#f5ede5"/>
      <circle cx="72" cy="18" r="2.6" fill="#f5ede5"/>
      <circle cx="82" cy="46" r="3.6" fill="#f5ede5"/>
      <circle cx="68" cy="78" r="3.6" fill="#f5ede5"/>
      <circle cx="22" cy="70" r="3.6" fill="#f5ede5"/>
      <circle cx="44" cy="44" r="3.6" fill="#f5ede5"/>
      <circle cx="50" cy="56" r="22" fill="none" stroke="#e8804a" stroke-opacity="0.10" stroke-width="1"/>
      <circle cx="50" cy="56" r="14" fill="none" stroke="#e8804a" stroke-opacity="0.22" stroke-width="1.2"/>
      <circle cx="50" cy="56" r="9" fill="url(#orb)"/>
    </g>
    <text x="164" y="86" class="sans" font-size="56" font-weight="700" letter-spacing="-2.24" fill="#f5ede5">learning<tspan fill="#f5ede5" fill-opacity="0.55" font-weight="400">/</tspan>runtime</text>
  </g>

  <!-- TAGLINE -->
  <text x="88" y="328" class="serif" font-size="64" letter-spacing="-1.28" fill="#f5ede5">Self-learning is a <tspan fill="#e8804a">superpower</tspan>.</text>

  <!-- PITCH -->
  <text x="88" y="392" class="sans" font-size="22" fill="#f5ede5" fill-opacity="0.85">
    <tspan x="88" dy="0" font-weight="600" fill="#f5ede5" fill-opacity="1">A Model Context Protocol server that turns your AI into a super-intelligent tutor.</tspan>
    <tspan x="88" dy="33">Tell it what you want to learn — and five cognitive-science algorithms decide</tspan>
    <tspan x="88" dy="33" fill="#f3a875" font-weight="500">what to study, when to review, and how hard the next exercise should be,</tspan>
    <tspan x="88" dy="33">until you don't need it anymore.</tspan>
  </text>

  <!-- FOOTER divider -->
  <line x1="88" y1="544" x2="1192" y2="544" stroke="#f5ede5" stroke-opacity="0.1" stroke-width="1"/>

  <!-- FOOTER LEFT: works with + provider logos -->
  <g transform="translate(88 580)">
    <text x="0" y="0" class="mono" font-size="12" letter-spacing="2.16" fill="#f5ede5" fill-opacity="0.55">WORKS WITH</text>
    <line x1="120" y1="-12" x2="120" y2="6" stroke="#f5ede5" stroke-opacity="0.18" stroke-width="1"/>

